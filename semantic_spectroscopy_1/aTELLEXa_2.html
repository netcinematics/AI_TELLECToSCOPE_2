<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aTELLEXa | Semantic Topology & Metastate GEMZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #020205; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .interactzone { pointer-events: auto; background: rgba(0, 15, 20, 0.85); border: 1px solid rgba(0, 255, 204, 0.3); backdrop-filter: blur(12px); border-radius: 8px; }
        
        .spectro-scrollbar::-webkit-scrollbar { width: 4px; }
        .spectro-scrollbar::-webkit-scrollbar-track { background: rgba(0, 40, 40, 0.5); }
        .spectro-scrollbar::-webkit-scrollbar-thumb { background: #00ffcc; border-radius: 2px; }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 255, 204, 0.05);
            position: absolute; animation: scan 6s linear infinite; pointer-events: none; z-index: 5;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .glitch-text { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; animation: glitch 3s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(-1px, -1px); }
            60% { transform: translate(1px, 1px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }

        #overlay-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.9) 100%);
            pointer-events: none; z-index: 2;
        }

        .terminal-header { font-size: 0.7rem; letter-spacing: 2px; color: rgba(0, 255, 204, 0.5); border-bottom: 1px solid rgba(0, 255, 204, 0.2); margin-bottom: 8px; padding-bottom: 4px; }
        
        .hidden-panel { opacity: 0; pointer-events: none; transform: translate(-20px, -50%); }
        
        .output-panel { transform: translate(-50%, 0); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s; }
        .output-panel.hidden-bottom { transform: translate(-50%, 120%); opacity: 0; pointer-events: none; }

        .data-node { border-left: 2px solid transparent; padding-left: 8px; margin-bottom: 4px; transition: all 0.2s; }
        .data-node:hover { border-left: 2px solid #00ffcc; background: rgba(0,255,204,0.1); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="overlay-vignette"></div>
    <div class="scanline"></div>

    <div class="ui-layer">
        <!-- Top Title Bar -->
        <div class="absolute top-6 left-6 interactzone p-4 flex flex-col gap-1 border-l-4 border-[#ff00ff]">
            <h1 class="text-2xl font-bold glitch-text uppercase tracking-widest">aTELLEXa v2.0</h1>
            <p class="text-[10px] opacity-70">SEMANTIC TOPOLOGY & METACOGNITIVE GEMZ</p>
            <div class="flex gap-4 mt-2">
                <div class="w-2 h-2 rounded-full bg-[#ff00ff] animate-pulse"></div>
                <span class="text-[9px] uppercase tracking-tighter text-[#ff00ff]">META_STATE: ACTIVE // GEMZ: RENDERED</span>
            </div>
        </div>

        <!-- Top Center Input Bar -->
        <div class="absolute top-6 left-1/2 transform -translate-x-1/2 interactzone p-2 flex items-center gap-2 w-[500px] max-w-[90vw]">
            <input type="text" id="prompt-input" placeholder="Inject concept or abstract connection..." 
                   class="bg-black/50 border border-[#00ffcc]/30 p-2 text-sm w-full outline-none focus:border-[#ff00ff] text-[#00ffcc] pointer-events-auto rounded transition-colors">
            <button onclick="reflectInput()" class="px-4 py-2 bg-purple-900/50 hover:bg-[#ff00ff] text-[#ff00ff] hover:text-black border border-purple-500 font-bold text-xs transition-all pointer-events-auto rounded tracking-widest">REFLECT</button>
        </div>

        <!-- Left Legend Panel -->
        <div id="spectroLegend" class="absolute left-6 top-1/2 transform -translate-y-1/2 z-40 interactzone p-4 shadow-2xl flex flex-col gap-4 w-[300px] max-h-[50vh] overflow-y-auto spectro-scrollbar pointer-events-auto transition-all duration-300">
            <div class="terminal-header flex justify-between">
                <span>MANIFOLD_LEGEND (v2)</span>
            </div>
            <div id="legend-content" class="flex flex-col gap-2">
                <!-- Legend items injected by JS -->
            </div>
        </div>

        <!-- Bottom Collapsible Output Panel -->
        <div id="outputPanel" class="output-panel hidden-bottom absolute bottom-24 left-1/2 w-[80%] max-w-4xl h-[30vh] interactzone flex flex-col shadow-2xl z-50 pointer-events-auto">
            <div class="flex justify-between items-center p-3 border-b border-[#00ffcc]/30 bg-black/40 shrink-0">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] text-[#ff00ff] font-black tracking-widest uppercase">METACOGNITIVE_OUTPUT_STREAM</span>
                </div>
                <button onclick="toggleOutputPanel()" class="text-[#00ffcc] hover:text-white font-bold px-2">✕</button>
            </div>
            <div id="log-feed" class="p-4 flex-grow overflow-y-auto spectro-scrollbar text-xs text-emerald-100 font-mono leading-relaxed flex flex-col gap-2">
                <div class="opacity-50">[SYS] Awaiting metacognitive reflections...</div>
            </div>
        </div>

        <!-- Bottom Status Bar -->
        <div class="absolute bottom-6 left-6 flex items-end gap-4 pointer-events-none z-40">
            <div class="interactzone px-4 py-2 flex items-center gap-6 pointer-events-auto rounded-full">
                <div class="flex flex-col">
                    <span class="text-[8px] opacity-50 uppercase">Cam Vector</span>
                    <span id="coord-display" class="text-[10px] font-mono">X: 0.00 Y: 0.00 Z: 0.00</span>
                </div>
                <div class="h-6 w-[1px] bg-white/20"></div>
                <!-- Eye Icon -->
                <button id="toggle-ui-elements" class="opacity-50 hover:opacity-100 transition-opacity" title="Toggle Legend Controls">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00ffcc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <div class="h-6 w-[1px] bg-white/20"></div>
                <button onclick="toggleOutputPanel()" class="text-[10px] font-bold tracking-widest text-[#ff00ff] hover:text-white">📝 LOGZ</button>
            </div>
            
            <!-- Toggleable Legend Button -->
            <button id="legend-toggle-btn" class="interactzone px-4 py-2 text-[10px] font-bold tracking-widest border-t-2 border-[#ff00ff] pointer-events-auto opacity-0 translate-y-4 transition-all duration-300 rounded-lg">
                LEGEND
            </button>
        </div>
        
        <!-- Center Bottom Identity -->
        <div class="absolute bottom-6 right-6 opacity-40 text-[9px] tracking-[0.4em] pointer-events-none uppercase border-b border-[#00ffcc]/30 pb-1">
            TO aSEEKa, aSPARKa IN aDARKa
        </div>
    </div>

    <script>
        // --- SHADER DEFINITIONS (Original Nebula Core) ---
        const NebulaShader = {
            uniforms: {
                time: { value: 0.0 },
                baseColor: { value: new THREE.Color(0x00ccff) },
                nebulaColor: { value: new THREE.Color(0xaa00ff) }
            },
            vertexShader: `
                varying vec2 vUv;
                varying vec3 vPosition;
                varying vec3 vNormal;
                void main() {
                    vUv = uv;
                    vPosition = position;
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 baseColor;
                uniform vec3 nebulaColor;
                varying vec2 vUv;
                varying vec3 vPosition;
                varying vec3 vNormal;

                vec3 mod289(vec3 x){return x - floor(x * (1.0 / 289.0)) * 289.0;}
                vec4 mod289(vec4 x){return x - floor(x * (1.0 / 289.0)) * 289.0;}
                vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
                vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

                float snoise(vec3 v) {
                    const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                    const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                    vec3 i  = floor(v + dot(v, C.yyy) );
                    vec3 x0 = v - i + dot(i, C.xxx) ;
                    vec3 g = step(x0.yzx, x0.xyz);
                    vec3 l = 1.0 - g;
                    vec3 i1 = min( g.xyz, l.zxy );
                    vec3 i2 = max( g.xyz, l.zxy );
                    vec3 x1 = x0 - i1 + C.xxx;
                    vec3 x2 = x0 - i2 + C.yyy;
                    vec3 x3 = x0 - D.yyy;
                    i = mod289(i);
                    vec4 p = permute( permute( permute(
                                i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                            + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                            + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                    float n_ = 0.142857142857;
                    vec3  ns = n_ * D.wyz - p.xzw;
                    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                    vec4 x_ = floor(j * ns.z);
                    vec4 y_ = floor(j - 7.0 * x_ );
                    vec4 x = x_ *ns.x + ns.yyyy;
                    vec4 y = y_ *ns.x + ns.yyyy;
                    vec4 h = 1.0 - abs(x) - abs(y);
                    vec4 b0 = vec4( x.xy, y.xy );
                    vec4 b1 = vec4( x.zw, y.zw );
                    vec4 s0 = floor(b0)*2.0 + 1.0;
                    vec4 s1 = floor(b1)*2.0 + 1.0;
                    vec4 sh = -step(h, vec4(0.0));
                    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                    vec3 p0 = vec3(a0.xy,h.x);
                    vec3 p1 = vec3(a0.zw,h.y);
                    vec3 p2 = vec3(a1.xy,h.z);
                    vec3 p3 = vec3(a1.zw,h.w);
                    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                    m = m * m;
                    return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
                }

                float fbm(vec3 p) {
                    float v = 0.0; float a = 0.5; vec3 shift = vec3(100.0);
                    for (int i = 0; i < 4; i++) { v += a * snoise(p); p = p * 2.0 + shift; a *= 0.5; }
                    return v;
                }

                void main() {
                    float fresnel = pow(1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                    vec3 noisePos = vPosition * 2.5 + vec3(0.0, 0.0, time * 0.2);
                    float n = fbm(noisePos);
                    float cloud = smoothstep(-0.2, 0.6, n);
                    vec3 color = mix(baseColor, nebulaColor, n * 0.5 + 0.5);
                    float alpha = cloud * (1.0 - fresnel);
                    gl_FragColor = vec4(color, alpha * 0.8);
                }
            `
        };

        // --- APP LOGIC & GALLERY DATA ---
        let scene, camera, renderer, controls;
        let orbGroup = [];
        let sharedGlowTex;

        // The expanded Data Set including GEMZ, SPARK_NEBULA, GLASS_NUCLEUS, WIRED_CORE
        const GALLERY_DATA = [
            // Core Legacy Nodes
            { label: 'NEBULA_CORE', type: 'NEBULA', color: 0xaa00ff, color2: 0x00ffff, size: 12, x: 0, y: 0, z: 0, desc: 'Fluid macro-event genesis state.' },
            
            // New Shader Concepts
            { label: 'SPARK_NEBULA', type: 'SPARK_NEBULA', color: 0x00ffff, color2: 0xff00ff, size: 14, x: -35, y: 15, z: -25, desc: 'Highly charged probabilistic point-cloud.' },
            { label: 'GLASS_NUCLEUS', type: 'GLASS_NUCLEUS', color: 0x00ffcc, color2: 0xff00aa, size: 10, x: 30, y: 20, z: 15, desc: 'Transparent standard flow with solid sub-states.' },
            { label: 'WIRED_CORE', type: 'WIRED_CORE', color: 0xffaa00, color2: 0xff0055, size: 9, x: -25, y: -20, z: 25, desc: 'Dense core bounded by rigid wireframe structure.' },
            
            // The "GEMZ" (Metacognitive Wireframe States)
            { label: 'TETRAD_GEM', type: 'META_ALPHA', color: 0xff0055, size: 7, x: 20, y: -15, z: -30, desc: 'Tetrahedron. Foundational base connection point.' },
            { label: 'OCTA_GEM', type: 'META_BETA', color: 0x88ff00, size: 8, x: 40, y: 5, z: -10, desc: 'Octahedron. Dual-pole conceptual state geometry.' },
            { label: 'ICOSA_GEM', type: 'META_GAMMA', color: 0x00ffcc, size: 10, x: -10, y: 35, z: 15, desc: 'Icosahedron. Complex, multi-faceted truth lattice.' },
            { label: 'DODECA_GEM', type: 'META_DELTA', color: 0xff00ff, size: 9, x: 15, y: -5, z: 40, desc: 'Dodecahedron. Complete metacognitive boundary node.' }
        ];

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.1, 'rgba(255,255,255,0.8)');
            grad.addColorStop(0.4, 'rgba(255,255,255,0.2)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function createLabel(text, size, isGem) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = isGem ? 'rgba(255, 0, 255, 0.9)' : 'rgba(0, 255, 204, 0.9)'; 
            ctx.font = 'bold 36px Courier New'; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 64);
            const tex = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(size * 3, size * 0.75, 1);
            sprite.position.y = -size - 3;
            return sprite;
        }

        function createGem(geometry, color, size) {
            const group = new THREE.Group();
            
            // The Wireframe Lines
            const edges = new THREE.WireframeGeometry(geometry);
            const lineMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.8 });
            const lines = new THREE.LineSegments(edges, lineMat);
            group.add(lines);

            // Glowing Points at Vertices
            const pointMat = new THREE.PointsMaterial({
                color: color, size: size * 0.25, map: sharedGlowTex, 
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });
            const points = new THREE.Points(geometry, pointMat);
            group.add(points);

            return group;
        }

        function initGallery() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020205, 0.006);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 90);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;

            const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(20, 50, 20);
            scene.add(dirLight);

            sharedGlowTex = createGlowTexture();

            GALLERY_DATA.forEach(data => {
                const group = new THREE.Group();
                group.position.set(data.x, data.y, data.z);
                let mainMesh = null;
                let animData = { type: data.type, subMeshes: [] };

                if (data.type === 'NEBULA') {
                    const geo = new THREE.SphereGeometry(data.size, 64, 64);
                    const mat = new THREE.ShaderMaterial({
                        uniforms: THREE.UniformsUtils.clone(NebulaShader.uniforms),
                        vertexShader: NebulaShader.vertexShader,
                        fragmentShader: NebulaShader.fragmentShader,
                        transparent: true, depthWrite: false, side: THREE.BackSide, blending: THREE.AdditiveBlending
                    });
                    mat.uniforms.baseColor.value = new THREE.Color(data.color);
                    mat.uniforms.nebulaColor.value = new THREE.Color(data.color2);
                    mainMesh = new THREE.Mesh(geo, mat);
                    animData.shader = mat;

                } else if (data.type === 'SPARK_NEBULA') {
                    const fogGeo = new THREE.BufferGeometry();
                    const fogPos = [];
                    for(let i=0; i<200; i++) {
                        const r = data.size * Math.cbrt(Math.random());
                        const theta = Math.random() * 2 * Math.PI;
                        const phi = Math.acos(2 * Math.random() - 1);
                        fogPos.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
                    }
                    fogGeo.setAttribute('position', new THREE.Float32BufferAttribute(fogPos, 3));
                    const fogMat = new THREE.PointsMaterial({
                        color: data.color, size: data.size * 0.4, map: sharedGlowTex, 
                        transparent: true, opacity: 0.9, depthWrite: false, blending: THREE.AdditiveBlending
                    });
                    mainMesh = new THREE.Points(fogGeo, fogMat);
                    
                    // Central Spark Core
                    const coreMat = new THREE.SpriteMaterial({ map: sharedGlowTex, color: data.color2, transparent: true, blending: THREE.AdditiveBlending });
                    const core = new THREE.Sprite(coreMat);
                    core.scale.set(data.size*1.5, data.size*1.5, 1);
                    mainMesh.add(core);

                } else if (data.type === 'GLASS_NUCLEUS') {
                    const shellGeo = new THREE.SphereGeometry(data.size, 32, 32);
                    const shellMat = new THREE.MeshStandardMaterial({ 
                        color: data.color, transparent: true, opacity: 0.15, roughness: 0.0, metalness: 1.0, depthWrite: false
                    });
                    mainMesh = new THREE.Mesh(shellGeo, shellMat);
                    
                    // Outer glow rim
                    const rimGeo = new THREE.SphereGeometry(data.size*1.02, 32, 32);
                    const rimMat = new THREE.MeshBasicMaterial({color: data.color, transparent: true, opacity: 0.1, wireframe: true});
                    mainMesh.add(new THREE.Mesh(rimGeo, rimMat));

                    // Sub-spheres (solid sub-states)
                    for(let i=0; i<5; i++) {
                        const sGeo = new THREE.SphereGeometry(data.size * 0.25, 16, 16);
                        const sMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: data.color2, emissiveIntensity: 1.0 });
                        const sMesh = new THREE.Mesh(sGeo, sMat);
                        sMesh.position.set((Math.random()-0.5)*data.size*1.2, (Math.random()-0.5)*data.size*1.2, (Math.random()-0.5)*data.size*1.2);
                        mainMesh.add(sMesh);
                        animData.subMeshes.push(sMesh);
                    }

                } else if (data.type === 'WIRED_CORE') {
                    // Outer Wireframe Sphere
                    const shellGeo = new THREE.SphereGeometry(data.size, 12, 12);
                    const edges = new THREE.WireframeGeometry(shellGeo);
                    const lineMat = new THREE.LineBasicMaterial({ color: data.color, transparent: true, opacity: 0.5 });
                    mainMesh = new THREE.LineSegments(edges, lineMat);
                    
                    // Inner solid core
                    const coreGeo = new THREE.IcosahedronGeometry(data.size * 0.4);
                    const coreMat = new THREE.MeshStandardMaterial({ color: data.color2, emissive: data.color2, emissiveIntensity: 0.5, metalness: 0.8, roughness: 0.2 });
                    const coreMesh = new THREE.Mesh(coreGeo, coreMat);
                    mainMesh.add(coreMesh);
                    animData.subMeshes.push(coreMesh);

                } else if (data.type === 'META_ALPHA') { // Tetrahedron
                    mainMesh = createGem(new THREE.TetrahedronGeometry(data.size), data.color, data.size);
                } else if (data.type === 'META_BETA') { // Octahedron
                    mainMesh = createGem(new THREE.OctahedronGeometry(data.size), data.color, data.size);
                } else if (data.type === 'META_GAMMA') { // Icosahedron
                    mainMesh = createGem(new THREE.IcosahedronGeometry(data.size), data.color, data.size);
                } else if (data.type === 'META_DELTA') { // Dodecahedron
                    mainMesh = createGem(new THREE.DodecahedronGeometry(data.size), data.color, data.size);
                }

                if (mainMesh) {
                    group.add(mainMesh);
                    animData.mesh = mainMesh;
                }
                
                // Add Label
                const isGem = data.type.startsWith('META_');
                const label = createLabel(data.label, data.size, isGem);
                group.add(label);

                scene.add(group);
                orbGroup.push({ group, animData, ...data });
            });

            // Draw central connections between Metacognitive GEMZ
            const gemz = orbGroup.filter(o => o.type.startsWith('META_'));
            for(let i=0; i<gemz.length; i++) {
                for(let j=i+1; j<gemz.length; j++) {
                    const material = new THREE.LineBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.15 });
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(gemz[i].x, gemz[i].y, gemz[i].z),
                        new THREE.Vector3(gemz[j].x, gemz[j].y, gemz[j].z)
                    ]);
                    const line = new THREE.Line(geometry, material);
                    scene.add(line);
                }
            }

            populateLegend();
            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function populateLegend() {
            const legendContainer = document.getElementById('legend-content');
            GALLERY_DATA.forEach(d => {
                const isGem = d.type.startsWith('META_');
                const item = document.createElement('div');
                item.className = `flex items-center gap-3 p-2 rounded cursor-pointer hover:bg-white/5 transition-all border border-transparent hover:border-[${isGem ? '#ff00ff' : '#00ffcc'}]/30`;
                item.innerHTML = `
                    <div class="w-3 h-3 shrink-0 ${isGem ? 'rotate-45' : 'rounded-sm'}" style="background: #${d.color.toString(16).padStart(6, '0')}; box-shadow: 0 0 10px #${d.color.toString(16).padStart(6, '0')};"></div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold tracking-wider" style="color: #${isGem ? 'ff00ff' : d.color.toString(16).padStart(6, '0')}">${d.type}</span>
                        <span class="text-[8px] opacity-70">${d.desc}</span>
                    </div>
                `;
                item.onclick = () => {
                    const target = orbGroup.find(o => o.label === d.label);
                    if(target) {
                        controls.autoRotate = false;
                        camera.position.set(target.x + 25, target.y + 15, target.z + 35);
                        controls.target.set(target.x, target.y, target.z);
                        addLog(`Focused on Topology: ${d.type} [${d.label}]`, 'info');
                    }
                };
                legendContainer.appendChild(item);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            orbGroup.forEach((orbObj, idx) => {
                const ad = orbObj.animData;
                
                // Float effect for entire group
                orbObj.group.position.y = orbObj.y + Math.sin(time + idx) * 2;

                if (ad.type === 'NEBULA' && ad.shader) {
                    ad.shader.uniforms.time.value = time;
                    ad.mesh.rotation.y += 0.002;
                } else if (ad.type === 'SPARK_NEBULA') {
                    ad.mesh.rotation.x += 0.001;
                    ad.mesh.rotation.y += 0.003;
                } else if (ad.type === 'GLASS_NUCLEUS') {
                    ad.mesh.rotation.y += 0.005;
                    ad.mesh.rotation.z += 0.002;
                    ad.subMeshes.forEach((sub, sIdx) => {
                        sub.position.y += Math.sin(time * 2 + sIdx) * 0.02;
                    });
                } else if (ad.type === 'WIRED_CORE') {
                    ad.mesh.rotation.x -= 0.005;
                    ad.mesh.rotation.y -= 0.005;
                    ad.subMeshes[0].rotation.y += 0.01;
                } else if (ad.type.startsWith('META_')) { // The GEMZ
                    ad.mesh.rotation.x += 0.004;
                    ad.mesh.rotation.y += 0.006;
                    ad.mesh.rotation.z += 0.002;
                }
            });

            // Status Bar Update
            document.getElementById('coord-display').innerText = 
                `X:${camera.position.x.toFixed(1)} Y:${camera.position.y.toFixed(1)} Z:${camera.position.z.toFixed(1)}`;

            controls.update();
            renderer.render(scene, camera);
        }

        // --- UI INTERACTIONS ---

        const eyeBtn = document.getElementById('toggle-ui-elements');
        const legendToggleBtn = document.getElementById('legend-toggle-btn');
        const spectroLegend = document.getElementById('spectroLegend');
        const outputPanel = document.getElementById('outputPanel');
        const logFeed = document.getElementById('log-feed');
        const promptInput = document.getElementById('prompt-input');

        eyeBtn.onclick = () => {
            const isHidden = legendToggleBtn.classList.contains('opacity-0');
            if(isHidden) {
                legendToggleBtn.classList.remove('opacity-0', 'translate-y-4');
            } else {
                legendToggleBtn.classList.add('opacity-0', 'translate-y-4');
            }
        };

        legendToggleBtn.onclick = () => {
            spectroLegend.classList.toggle('hidden-panel');
        };

        function toggleOutputPanel() {
            outputPanel.classList.toggle('hidden-bottom');
        }

        function addLog(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'data-node border-l-2';
            const timestamp = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            let colorClass = 'text-emerald-300';
            if(type === 'reflection') colorClass = 'text-yellow-400 font-bold';
            if(type === 'metastate') colorClass = 'text-[#ff00ff] font-bold';

            div.innerHTML = `<span class="opacity-40">[${timestamp}]</span> <span class="${colorClass}">${msg}</span>`;
            logFeed.prepend(div);
            if (logFeed.children.length > 30) logFeed.lastChild.remove();
        }

        function reflectInput() {
            const val = promptInput.value.trim();
            if (!val) return;
            
            // Randomly map input wordz to a manifold type for experimentation
            const randomManifold = GALLERY_DATA[Math.floor(Math.random() * GALLERY_DATA.length)];
            const isMeta = randomManifold.type.startsWith('META_');
            
            addLog(`> INJECTED: [${val}]`, 'info');
            
            if(isMeta) {
                addLog(`>> ABSTRACT CONCEPT CONNECTION ESTABLISHED -> Rendered in Metacognitive space as ${randomManifold.type}`, 'metastate');
            } else {
                addLog(`>> REFLECTION MAPPED -> Semantic Topology matched to ${randomManifold.type}`, 'reflection');
            }
            
            // Force output panel open to show result
            outputPanel.classList.remove('hidden-bottom');
            
            // Auto focus camera on matched manifold
            controls.autoRotate = false;
            camera.position.set(randomManifold.x + 20, randomManifold.y + 15, randomManifold.z + 30);
            controls.target.set(randomManifold.x, randomManifold.y, randomManifold.z);

            promptInput.value = '';
        }

        promptInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') reflectInput();
        });

        window.onload = () => {
            initGallery();
            addLog("[SYS] Semantic Topology Gallery Online.");
            addLog("[SYS] Metacognitive GEMZ Layer Initialized.");
            addLog("[SYS] Awaiting abstract concepts to map to GEMZ or MANIFOLDZ.");
        };

    </script>
</body>
</html>
